<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Student Management System</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/students">Back to Students</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2>Student Details</h2>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title" th:text="${student.name}"></h5>
            <p class="card-text"><strong>Email:</strong> <span th:text="${student.email}"></span></p>
            <p class="card-text"><strong>Course:</strong> <span th:text="${student.course}"></span></p>
            <p class="card-text"><strong>Created At:</strong> <span th:text="${#temporals.format(student.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p class="card-text"><strong>Updated At:</strong> <span th:text="${student.updatedAt != null ? #temporals.format(student.updatedAt, 'yyyy-MM-dd HH:mm') : 'N/A'}"></span></p>
        </div>
    </div>
    <a href="/students" class="btn btn-secondary mt-3">Back</a>
</div>
</body>
</html>
